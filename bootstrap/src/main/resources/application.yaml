spring:
  application:
    name: api

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY}
        project-id: ${GOOGLE_GENAI_PROJECT_ID}
        location: ${GOOGLE_GENAI_LOCATION}
        chat:
          options:
            model: ${GOOGLE_GENAI_CHAT_MODEL}
            temperature: ${GOOGLE_GENAI_TEMPERATURE:0.7}
            max-tokens: ${GOOGLE_GENAI_MAX_TOKENS:4096}
        embedding:
          text:
            options:
              model: ${GOOGLE_GENAI_TEXT_EMBEDDING_MODEL}
          project-id: ${GOOGLE_GENAI_PROJECT_ID}
          location: ${GOOGLE_GENAI_LOCATION}
          api-key: ${GOOGLE_GENAI_API_KEY}

    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        collection-name: ${QDRANT_COLLECTION_NAME}
        use-tls: false
        initialize-schema: false

frame-search:
  score-threshold: 0.60
  post-filter-multiplier: 3

snowflake:
  datacenter-id: 1
  worker-id: 10

cors:
  allowed-origins:
    - http://localhost:*

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    try-it-out-enabled: true
    disable-favicon: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  enable-kotlin: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  prometheus:
    metrics:
      export:
        enabled: true

  endpoint:
    prometheus:
      access: unrestricted

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

      percentiles:
        http.server.requests: 0.5,0.95,0.99
