services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - examhelper-net
    volumes:
      - app-logs:/app/logs

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - examhelper-net

volumes:
  qdrant-data:
  app-logs:

networks:
  examhelper-net:
    driver: bridge
